services:

  postgres:
    image: docker.arvancloud.ir/postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scuser} -d ${POSTGRES_DB:-secure_clipboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foratik

  redis:
    image: docker.arvancloud.ir/redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - foratik

  clipboard:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: clipboard-backend:latest
    container_name: clipboard-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - foratik

volumes:
  postgres_data:
  redis_data:

networks:
  foratik:
    name: foratik
    driver: bridge
